---
- name: Get latest RustDesk release info
  ansible.builtin.uri:
    url: https://api.github.com/repos/rustdesk/rustdesk/releases/latest
    return_content: true
    headers:
      Accept: application/vnd.github.v3+json
    status_code: 200
  register: rustdesk_release

- name: Set RustDesk version facts
  ansible.builtin.set_fact:
    rustdesk_version: "{{ rustdesk_release.json.tag_name | regex_replace('^v', '') }}"
    rustdesk_tag: "{{ rustdesk_release.json.tag_name }}"

- name: Assert release tag was returned
  ansible.builtin.assert:
    that:
      - rustdesk_release.json.tag_name is defined
      - rustdesk_release.json.tag_name | length > 0
    fail_msg: "GitHub API did not return a valid tag_name — possible rate limiting"

- name: Check installed RustDesk version
  ansible.builtin.command:
    cmd: dpkg-query -W -f='${Version}' rustdesk
  register: rustdesk_installed
  failed_when: false
  changed_when: false

- name: Download RustDesk .deb
  ansible.builtin.get_url:
    url: "https://github.com/rustdesk/rustdesk/releases/download/{{ rustdesk_tag }}/rustdesk-{{ rustdesk_version }}-x86_64.deb"
    dest: /tmp/rustdesk.deb
    mode: "0644"
  when: rustdesk_installed.stdout != rustdesk_version

- name: Install RustDesk
  ansible.builtin.apt:
    deb: /tmp/rustdesk.deb
  when: rustdesk_installed.stdout != rustdesk_version

- name: Remove downloaded .deb
  ansible.builtin.file:
    path: /tmp/rustdesk.deb
    state: absent
  when: rustdesk_installed.stdout != rustdesk_version

- name: Install RustDesk system tray dependency
  ansible.builtin.apt:
    name: libayatana-appindicator3-1
    state: present

- name: Disable RustDesk system service (started by sway instead)
  ansible.builtin.systemd:
    name: rustdesk
    enabled: false
    state: stopped
  failed_when: false

- name: Create RustDesk config directory
  ansible.builtin.file:
    path: "/home/{{ dev_username }}/.config/rustdesk"
    state: directory
    owner: "{{ dev_username }}"
    group: "{{ dev_username }}"
    mode: "0700"

- name: Configure RustDesk options
  ansible.builtin.copy:
    dest: "/home/{{ dev_username }}/.config/rustdesk/RustDesk2.toml"
    owner: "{{ dev_username }}"
    group: "{{ dev_username }}"
    mode: "0600"
    content: |
      [options]
      direct-server = "Y"
      direct-access-port = "21118"
      enable-audio = "N"
