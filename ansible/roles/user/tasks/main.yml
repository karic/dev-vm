---
- name: Create dev user
  ansible.builtin.user:
    name: "{{ dev_username }}"
    shell: "{{ dev_shell }}"
    create_home: yes
    groups: sudo
    append: yes

- name: Allow passwordless sudo for dev user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ dev_username }}"
    content: "{{ dev_username }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "visudo -cf %s"

- name: Create .ssh directory
  ansible.builtin.file:
    path: "/home/{{ dev_username }}/.ssh"
    state: directory
    owner: "{{ dev_username }}"
    group: "{{ dev_username }}"
    mode: "0700"

- name: Create ~/.config directory
  ansible.builtin.file:
    path: "/home/{{ dev_username }}/.config"
    state: directory
    owner: "{{ dev_username }}"
    group: "{{ dev_username }}"
    mode: "0755"

- name: Create ~/.local/share directory
  ansible.builtin.file:
    path: "/home/{{ dev_username }}/.local/share"
    state: directory
    owner: "{{ dev_username }}"
    group: "{{ dev_username }}"
    mode: "0755"

- name: Enable user lingering for systemd user services
  ansible.builtin.command:
    cmd: loginctl enable-linger "{{ dev_username }}"
  changed_when: false
