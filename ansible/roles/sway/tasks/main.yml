---
- name: Install Sway and Wayland packages
  ansible.builtin.apt:
    name:
      - sway
      - swaylock
      - swayidle
      - waybar
      - wofi
      - alacritty
      - greetd
      - pipewire
      - wireplumber
      - xdg-desktop-portal-wlr
      - grim
      - slurp
      - wl-clipboard
      - libnotify-bin
      - mako-notifier
    state: present

- name: Configure greetd for autologin into sway
  ansible.builtin.copy:
    dest: /etc/greetd/config.toml
    content: |
      [terminal]
      vt = 1

      [default_session]
      command = "env WLR_BACKENDS=headless WLR_LIBINPUT_NO_DEVICES=1 sway"
      user = "{{ dev_username }}"

      [initial_session]
      command = "env WLR_BACKENDS=headless WLR_LIBINPUT_NO_DEVICES=1 sway"
      user = "{{ dev_username }}"
    mode: "0644"

- name: Add {{ dev_username }} to video and render groups for DRM/Wayland access
  ansible.builtin.user:
    name: "{{ dev_username }}"
    groups:
      - video
      - render
    append: yes

- name: Enable and start greetd
  ansible.builtin.systemd:
    name: greetd
    enabled: yes
    state: started

- name: Create sway config directory
  ansible.builtin.file:
    path: /home/{{ dev_username }}/.config/sway
    state: directory
    owner: "{{ dev_username }}"
    group: "{{ dev_username }}"
    mode: "0755"

- name: Deploy sway config
  ansible.builtin.copy:
    src: sway.conf
    dest: /home/{{ dev_username }}/.config/sway/config
    owner: "{{ dev_username }}"
    group: "{{ dev_username }}"
    mode: "0644"

- name: Create waybar config directory
  ansible.builtin.file:
    path: /home/{{ dev_username }}/.config/waybar
    state: directory
    owner: "{{ dev_username }}"
    group: "{{ dev_username }}"
    mode: "0755"

- name: Deploy waybar config
  ansible.builtin.copy:
    src: waybar.conf
    dest: /home/{{ dev_username }}/.config/waybar/config
    owner: "{{ dev_username }}"
    group: "{{ dev_username }}"
    mode: "0644"
