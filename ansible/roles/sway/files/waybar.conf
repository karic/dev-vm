[
  {
    "layer": "top",
    "position": "top",
    "modules-left": ["sway/workspaces"],
    "modules-center": ["clock"],
    "modules-right": ["cpu", "memory", "network"],
    "sway/workspaces": {
      "disable-scroll": true,
      "all-outputs": true
    },
    "clock": {
      "format": "{:%H:%M  %Y-%m-%d}"
    },
    "cpu": {
      "format": "CPU {usage}%",
      "interval": 5
    },
    "memory": {
      "format": "MEM {used:0.1f}G",
      "interval": 5
    },
    "network": {
      "format-ethernet": "ETH {bandwidthDownBytes}",
      "format-disconnected": "DISCONNECTED"
    }
  }
]
