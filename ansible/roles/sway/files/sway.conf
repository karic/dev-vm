# Mod1 = Alt — mirrored from aerospace config
set $mod Mod1

font pango:monospace 10

# Terminal
bindsym $mod+Return exec alacritty

# Kill focused window (Shift+c avoids conflict with workspace Q binding)
bindsym $mod+Shift+c kill

# App launcher
bindsym $mod+d exec wofi --show drun

# Reload config
bindsym $mod+Shift+r reload

# --- Focus (vim keys)
bindsym $mod+h focus left
bindsym $mod+j focus down
bindsym $mod+k focus up
bindsym $mod+l focus right

# --- Move window
bindsym $mod+Shift+h move left
bindsym $mod+Shift+j move down
bindsym $mod+Shift+k move up
bindsym $mod+Shift+l move right

# --- Workspaces 1-10
bindsym $mod+1 workspace "1"
bindsym $mod+2 workspace "2"
bindsym $mod+3 workspace "3"
bindsym $mod+4 workspace "4"
bindsym $mod+5 workspace "5"
bindsym $mod+6 workspace "6"
bindsym $mod+7 workspace "7"
bindsym $mod+8 workspace "8"
bindsym $mod+9 workspace "9"
bindsym $mod+0 workspace "0"

# --- Workspaces Q-O (secondary display equivalent)
bindsym $mod+q workspace "Q"
bindsym $mod+w workspace "W"
bindsym $mod+e workspace "E"
bindsym $mod+r workspace "R"
bindsym $mod+t workspace "T"
bindsym $mod+y workspace "Y"
bindsym $mod+u workspace "U"
bindsym $mod+i workspace "I"
bindsym $mod+o workspace "O"

# --- Move container to workspace + follow focus (1-10)
bindsym $mod+Shift+1 move container to workspace "1"; workspace "1"
bindsym $mod+Shift+2 move container to workspace "2"; workspace "2"
bindsym $mod+Shift+3 move container to workspace "3"; workspace "3"
bindsym $mod+Shift+4 move container to workspace "4"; workspace "4"
bindsym $mod+Shift+5 move container to workspace "5"; workspace "5"
bindsym $mod+Shift+6 move container to workspace "6"; workspace "6"
bindsym $mod+Shift+7 move container to workspace "7"; workspace "7"
bindsym $mod+Shift+8 move container to workspace "8"; workspace "8"
bindsym $mod+Shift+9 move container to workspace "9"; workspace "9"
bindsym $mod+Shift+0 move container to workspace "0"; workspace "0"

# --- Move container to workspace + follow focus (Q-O)
bindsym $mod+Shift+q move container to workspace "Q"; workspace "Q"
bindsym $mod+Shift+w move container to workspace "W"; workspace "W"
bindsym $mod+Shift+e move container to workspace "E"; workspace "E"
bindsym $mod+Shift+r move container to workspace "R"; workspace "R"
bindsym $mod+Shift+t move container to workspace "T"; workspace "T"
bindsym $mod+Shift+y move container to workspace "Y"; workspace "Y"
bindsym $mod+Shift+u move container to workspace "U"; workspace "U"
bindsym $mod+Shift+i move container to workspace "I"; workspace "I"
bindsym $mod+Shift+o move container to workspace "O"; workspace "O"

# --- Workspace back and forth
bindsym $mod+Tab workspace back_and_forth

# --- Fullscreen
bindsym $mod+Shift+f fullscreen toggle

# --- Resize
bindsym $mod+minus resize shrink width 50 px
bindsym $mod+equal resize grow width 50 px

# --- Layout
bindsym $mod+Shift+backslash layout toggle split
bindsym $mod+Shift+slash floating toggle

# --- Status bar
bar {
    swaybar_command waybar
}

# --- Output (headless VM)
output HEADLESS-1 resolution 1920x1080 position 0,0

# --- Wallpaper
output * bg #1a1a2e solid_color

# --- Autostart
exec --no-startup-id mako
exec --no-startup-id dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway
exec --no-startup-id rustdesk
