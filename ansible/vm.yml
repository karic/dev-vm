---
- hosts: localhost
  connection: local
  become: yes
  vars_files:
    - vars/main.yml
  vars:
    dev_username: mkaric
    dev_shell: /bin/bash
    base_packages:
      - curl
      - wget
      - git
      - ca-certificates
      - locales
      - openssh-server
      - sudo
      - fonts-noto
      - fonts-noto-color-emoji
  roles:
    - base
    - user
    - sway
    - rustdesk
